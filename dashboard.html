   GENERATE TICKET ID

function generateTicketId() {
    const now = new Date();
    
    // 1. Ambil 2 digit tahun, bulan, dan tanggal
    const year = now.getFullYear().toString().slice(-2); // 26
    const month = (now.getMonth() + 1).toString().padStart(2, '0'); // 06
    const day = now.getDate().toString().padStart(2, '0'); // 08
    
    // 2. Ambil nomor urut dari counter (pastikan ticketCounter dimulai dari 1 setiap hari)
    // Jika ingin nomor urut reset setiap hari, Anda butuh logika tambahan
    const sequence = (ticketCounter || 1).toString().padStart(3, '0');
    
    // 3. Gabungkan menjadi format FLM-YYMMDDXXX
    return `FLM-${year}${month}${day}${sequence}`;
}

function generateReplenishId() {
    const now = new Date();
    const year = now.getFullYear().toString().slice(-2);
    const month = (now.getMonth() + 1).toString().padStart(2, '0');
    const day = now.getDate().toString().padStart(2, '0');
    
    // Ambil counter dari localStorage, jika tidak ada mulai dari 1
    let counter = parseInt(localStorage.getItem("replenishCounter")) || 1;
    const sequence = counter.toString().padStart(3, '0');
    
    // Simpan counter terbaru agar tidak duplikat untuk tiket berikutnya
    localStorage.setItem("replenishCounter", counter + 1);
    
    return `RPL-${year}${month}${day}${sequence}`;
}

function updateSidebarClock() {

    document.getElementById('liveClock').textContent = now.toLocaleTimeString('id-ID', timeOptions);
        
    // Format Tanggal (dd-mmm-yy)
    const day = String(now.getDate()).padStart(2, '0');
    const months = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Ags", "Sep", "Okt", "Nov", "Des"];
    const month = months[now.getMonth()];
    const year = String(now.getFullYear()).slice(-2);
        
    document.getElementById('liveDate').textContent = `${day}-${month}-${year}`;
}

function renderDashboard() {
    // 1. Logika Statistik Utama
    const totalATM = masterDataATM.length;
    const atmNormal = masterDataATM.filter(atm => atm.status === "Aktif").length;
    const atmProblem = totalATM - atmNormal;
    const percentProblem = totalATM > 0 ? ((atmProblem / totalATM) * 100).toFixed(1) : 0;

    // Update Angka di Dashboard
    document.getElementById("dashboardTotalATM").innerText = totalATM;
    document.getElementById("dashboardNormalATM").innerText = atmNormal;
    document.getElementById("dashboardProblemATM").innerText = atmProblem;
    document.getElementById("dashboardPercentProblem").innerText = percentProblem + "%";

    // 2. Logika Tabel Top 5 ATM Sering Problem
    // Asumsi: Kita mencari ATM dengan status "Problem" (Anda bisa menyesuaikan logikanya)
    const tbodyProblem = document.getElementById("tableTopProblem");
    tbodyProblem.innerHTML = ""; 

    // Filter hanya yang statusnya bukan "Aktif" lalu ambil 5 teratas
    const topProblems = masterDataATM
        .filter(atm => atm.status !== "Aktif")
        .slice(0, 5);

    if (topProblems.length === 0) {
        tbodyProblem.innerHTML = `<tr><td colspan="4" class="px-4 py-4 text-center text-gray-400">Tidak ada data problem</td></tr>`;
    } else {
        topProblems.forEach(atm => {
            tbodyProblem.innerHTML += `
                <tr class="hover:bg-slate-50">
                    <td class="px-4 py-4 text-sm font-bold text-slate-700">${atm.idATM}</td>
                    <td class="px-4 py-4 text-sm text-slate-600">${atm.lokasi}</td>
                    <td class="px-4 py-4 text-sm text-red-600 font-medium">Gangguan ${atm.status}</td>
                    <td class="px-4 py-4 text-sm text-right text-slate-600">1</td>
                </tr>
            `;
        });
    }

    // 3. Logika Tabel Top 5 ATM Sering Replenish
    const tbodyReplenish = document.getElementById("tableTopReplenish");
    tbodyReplenish.innerHTML = "";

    // Contoh: Mengambil 5 data pertama dari masterReplenish (jika ada)
    const topReplenish = masterReplenish.slice(0, 5);

    if (topReplenish.length === 0) {
        tbodyReplenish.innerHTML = `<tr><td colspan="3" class="px-4 py-4 text-center text-gray-400">Belum ada data replenish</td></tr>`;
    } else {
        topReplenish.forEach(item => {
            tbodyReplenish.innerHTML += `
                <tr class="hover:bg-slate-50">
                    <td class="px-4 py-4 text-sm font-bold text-slate-700">${item.idATM}</td>
                    <td class="px-4 py-4 text-sm text-slate-600">${item.lokasi || '-'}</td>
                    <td class="px-4 py-4 text-sm text-right text-slate-600">${item.frekuensi || 1}</td>
                </tr>
            `;
        });
    }
}

// Fungsi Universal untuk mengisi dropdown
function populateATMDropdown(elementId) {
    const selectATM = document.getElementById(elementId);
    if (!selectATM) return;

    // Bersihkan dulu
    selectATM.innerHTML = '<option value="">Pilih ID ATM</option>';
    
    // Pastikan data master ada
    if (typeof masterDataATM !== 'undefined' && Array.isArray(masterDataATM)) {
        // Urutkan abjad
        const sortedData = [...masterDataATM].sort((a, b) => a.idATM.localeCompare(b.idATM));
        
        sortedData.forEach(atm => {
            const option = document.createElement("option");
            option.value = atm.idATM;
            option.textContent = `${atm.idATM} - ${atm.lokasi}`;
            selectATM.appendChild(option);
        });
    }
}

function handleTicketATMChange() {
    const selectATM = document.getElementById("ticketATM");
    const inputVendor = document.getElementById("ticketVendor");
    if(!selectATM || !inputVendor) return;
    
    const selectedID = selectATM.value;
    const foundATM = masterDataATM.find(atm => atm.idATM === selectedID);
    
    if(foundATM) {
        inputVendor.value = foundATM.vendor;
    } else {
        inputVendor.value = "";
    }
}

            }

    }).then((result) => {
        if (result.isConfirmed && result.value.atmId) {
            // Logika simpan khusus Replenish
            const newTicket = {
                ticketId: "RPL-" + Date.now().toString().slice(-5),
                atmId: result.value.atmId,
                nominal: result.value.nominal,
                vendor: result.value.vendor,
                status: "PENDING"
            };
            masterReplenish.push(newTicket);
            localStorage.setItem("masterReplenish", JSON.stringify(masterReplenish));
            renderReplenishTable();
            Swal.fire('Berhasil!', 'Order Replenish tersimpan.', 'success');
        }
    });

// 3. FUNGSI UNTUK MENYIMPAN DATA (DENGAN VALIDASI AMAN)
function saveReplenish() {
    // 1. Ambil elemen
    const elAtmId = document.getElementById("repAtmId");
    const elVendor = document.getElementById("repVendor");
    const elDenom = document.getElementById("repDenom");
    const elNominal = document.getElementById("repNominal");
    const elDate = document.getElementById("repTicketDate");
    const elTime = document.getElementById("repTicketTime");

    // 2. AMBIL NILAI (Untuk validasi)
    const valAtmId = elAtmId.value;
    const valNominal = elNominal.value;
    const valDate = elDate.value;

    // 3. VALIDASI TERLEBIH DAHULU
    if (!valAtmId || !valNominal || !valDate) {
        Swal.fire({
            icon: 'error',
            title: 'Oops...',
            text: 'Data belum lengkap!',
            confirmButtonColor: '#2563eb'
        });
        return; // Hentikan fungsi di sini, jangan lanjut!
    }

    // 4. BUAT OBJEK DATA (Hanya jika lolos validasi)
    const dataBaru = {
        ticketId: generateReplenishId(),
        atmId: valAtmId,
        vendor: elVendor.value,
        denom: elDenom.value,
        nominal: valNominal,
        date: valDate,
        time: elTime.value,
        status: "OPEN",
        createdAt: new Date().toISOString()
    };

    // 5. SIMPAN KE SERVER / LOCALSTORAGE
    // Karena aplikasi Anda sudah sinkron server, sebaiknya langsung push ke masterReplenish global
    masterReplenish.push(dataBaru);
    syncToServer(); // Pastikan data langsung terkirim ke server

    // 6. SELESAIKAN
    renderReplenishTable();
    closeReplenishModal();
    Swal.fire('Berhasil', 'Data berhasil disimpan', 'success');
}

/* =========================================
   SAVE / UPDATE TICKET (Koneksi Server)
========================================= */
async function saveTicket() {
    const index = document.getElementById("editTicketIndex").value;
    const newTicket = {
        atmId: document.getElementById("ticketATM").value,
        vendor: document.getElementById("ticketVendor").value,
        problem: document.getElementById("ticketProblem").value,
        date: document.getElementById("ticketDate").value,
        time: document.getElementById("ticketTime").value,
        status: 'Open'
    };

    try {
        if (index === "-1" || index === "") {
            // Menambah data baru
            await db.collection('tickets').add(newTicket);
            Swal.fire("Berhasil", "Data baru telah ditambahkan!", "success");
        } else {
            // Update data berdasarkan docId yang tersimpan di masterTicket
            const docId = masterTicket[index].docId;
            await db.collection('tickets').doc(docId).update(newTicket);
            Swal.fire("Berhasil", "Data telah diperbarui!", "success");
        }
        closeTicketModal();
    } catch (error) {
        Swal.fire("Error", "Gagal menyimpan ke database", "error");
        console.error(error);
    }
}

function confirmTicket(index) {
    Swal.fire({
        title: "Konfirmasi Tindakan",
        input: "textarea",
        inputLabel: "Action Taken",
        inputPlaceholder: "Masukkan tindakan yang telah dilakukan",
        showCancelButton: true,
        confirmButtonText: "Simpan",
        inputValidator: (value) => { if(!value) return "Action Taken wajib diisi"; }
    }).then((result) => {
        if (!result.isConfirmed) return;

        const ticket = masterTicket[index];
        ticket.action = result.value;
        ticket.status = "PENDING_VALIDATION"; // Ubah status
        
        // Simpan perubahan
        localStorage.setItem("masterTicket", JSON.stringify(masterTicket));
        renderTicketTable(masterTicket);
        Swal.fire("Berhasil", "Tiket menunggu validasi.", "success");
    });
}

function confirmReplenish(index) {
    // 1. Ambil data dari localStorage
    let masterReplenish = JSON.parse(localStorage.getItem("masterReplenish")) || [];
    const ticket = masterReplenish[index];

    if (!ticket) {
        Swal.fire("Error", "Tiket tidak ditemukan!", "error");
        return;
    }

    // 2. Tampilkan Popup Konfirmasi
    Swal.fire({
        title: 'Konfirmasi Tiket?',
        text: `Apakah sudah selesai dilakukan Replenish ${ticket.ticketId}?`,
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#3085d6',
        cancelButtonColor: '#d33',
        confirmButtonText: 'Ya, Sudah Selesai!'
    }).then((result) => {
        if (result.isConfirmed) {
            // 3. Ubah status tiket menjadi PENDING_VALIDATION
            masterReplenish[index].status = 'PENDING_VALIDATION';
            
            // 4. Simpan kembali ke localStorage
            localStorage.setItem("masterReplenish", JSON.stringify(masterReplenish));
            
            // 5. Refresh Tabel & Tampilkan sukses
            renderReplenishTable();
            Swal.fire("Berhasil!", "Tiket telah dikonfirmasi, menunggu validasi.", "success");
        }
    });
}

function validateTicketProcess(index) {
    const ticket = masterTicket[index];

    Swal.fire({
        title: `Validasi Tiket: ${ticket.ticketId}`,
        html: `<div class="text-left">
                <p><strong>Action Taken:</strong> ${ticket.action}</p>
               </div>`,
        showDenyButton: true,
        showCancelButton: true,
        confirmButtonText: 'Approve',
        denyButtonText: 'Reject',
        cancelButtonText: 'Batal',
        confirmButtonColor: '#16a34a',
        denyButtonColor: '#dc2626'
    }).then((result) => {
        if (result.isConfirmed) {
            // APPROVE: Pindahkan ke History
            ticket.status = "CLOSED";
            const now = new Date();
            ticket.closeDate = now.toISOString().split("T")[0];
            ticket.closeTime = now.toLocaleTimeString("id-ID",{ hour:"2-digit", minute:"2-digit" });
            
            historyTicket.push({...ticket});
            masterTicket.splice(index, 1);
            
            localStorage.setItem("historyTicket", JSON.stringify(historyTicket));
            localStorage.setItem("masterTicket", JSON.stringify(masterTicket));
            renderTicketTable(masterTicket);
            Swal.fire("Disetujui!", "Tiket telah ditutup.", "success");

        } else if (result.isDenied) {
            // REJECT: Input alasan
            Swal.fire({
                title: "Alasan Reject",
                input: "text",
                inputPlaceholder: "Masukkan alasan reject...",
                confirmButtonText: "Simpan",
                inputValidator: (val) => { if(!val) return "Alasan wajib diisi"; }
            }).then((rej) => {
                if(rej.isConfirmed) {
                    ticket.status = "REJECTED";
                    ticket.keteranganReject = rej.value; // Simpan alasan
                    localStorage.setItem("masterTicket", JSON.stringify(masterTicket));
                    renderTicketTable(masterTicket);
                }
            });
        }
    });
}

/* =========================================
   TABLE RENDERING FUNCTIONS
========================================= */
function renderTicketTable() {
    // 1. Ambil data tiket dari localStorage
    const tickets = JSON.parse(localStorage.getItem("masterTicket")) || [];
    const tbody = document.getElementById("ticketTableBody");
    
    if (!tbody) return;
    tbody.innerHTML = ""; // Bersihkan isi tabel

    // 2. Loop melalui data tiket
    tickets.forEach((t, index) => {
        // --- LOGIKA PENGAMBILAN DATA DARI MASTER ATM ---
        // Mencari data ATM berdasarkan idATM atau atmId
        const atmData = (typeof masterDataATM !== 'undefined') 
                        ? masterDataATM.find(atm => atm.idATM === (t.idATM || t.atmId)) 
                        : null;

        // Mendefinisikan variabel untuk baris tabel
        const atmId = t.idATM || t.atmId || '-';
        const lokasi = atmData ? atmData.lokasi : (t.lokasi || t.location || '-');
        const vendor = atmData ? atmData.vendor : (t.vendor || '-');
        const problem = t.problem || t.masalah || '-';
        const tanggal = t.tanggal || t.date || '-';
        const jam = t.jam || t.time || '-';
        const keterangan = t.keteranganReject || '-';

        // 3. Render 12 Kolom        
        const row = `
            <tr class="border-b border-gray-100 hover:bg-blue-50/30 transition-colors">
                <td class="p-3 text-center">${t.ticketId || '-'}</td>
                <td class="p-3 text-center">${atmId}</td>
                <td class="p-3">${lokasi}</td>
                <td class="p-3 text-center">${vendor}</td>
                <td class="p-3 text-center">${problem}</td>
                <td class="p-3 text-center">
                    <span class="px-2 py-1 rounded text-xs font-semibold ${getStatusClass(t.status)}">
                        ${t.status || 'OPEN'}
                    </span>
                </td>
                <td class="p-3 text-center">${tanggal}</td>
                <td class="p-3 text-center">${jam}</td>
                <td class="p-3 text-center">
                    <button onclick="confirmTicket(${index})" class="text-blue-600"><i class="fa-solid fa-check-to-slot"></i></button>
                </td>
                <td class="p-3 text-center">
                    <button onclick="validateTicketProcess(${index})" class="text-green-600"><i class="fa-solid fa-user-check"></i></button>
                </td>
                <td class="p-3 text-center">
                    <button onclick="showActionPopupProblem(${index})" class="text-orange-500 hover:text-orange-700">
                        <i class="fa-solid fa-edit"></i>
                    </button>
                </td>
                <td class="p-3 text-xs text-red-600 italic">
                    ${keterangan}
                </td>
            </tr>
        `;
        tbody.innerHTML += row;
    });
}

// Fungsi pembantu untuk warna badge
function getStatusClass(status) {
    if (status === 'OPEN') return 'bg-blue-100 text-blue-700';
    if (status === 'PENDING_VALIDATION') return 'bg-yellow-100 text-yellow-700';
    if (status === 'REJECTED') return 'bg-red-100 text-red-700';
    return 'bg-gray-100 text-gray-700';
}

// Helper untuk warna status
function getStatusColor(status) {
    switch(status) {
        case 'OPEN': return 'bg-blue-100 text-blue-800';
        case 'PENDING_VALIDATION': return 'bg-yellow-100 text-yellow-800';
        case 'REJECTED': return 'bg-red-100 text-red-800';
        default: return 'bg-gray-100';
    }
}

}

function renderHistoryTable(data) {
    const table = document.getElementById("historyTable");
    if (!table) return;

    if (data.length === 0) {
        table.innerHTML = `<tr><td colspan="10" class="text-center p-10 text-gray-400">Belum ada data</td></tr>`;
        return;
    }

    table.innerHTML = data.map(item => {
        const atmDetail = masterDataATM.find(a => a.idATM === item.atmId);
        const lokasi = atmDetail ? atmDetail.lokasi : "N/A";

        return `
        <tr class="border-b hover:bg-gray-50 text-sm">
            <td class="p-3">${item.ticketId}</td>
            <td class="p-3">${item.atmId}</td>
            <td class="p-3">${lokasi}</td>
            <td class="p-3">${item.vendor}</td>
            <td class="p-3">${item.problem}</td>
            <td class="p-3">
                <span class="px-3 py-1 rounded-xl bg-green-100 text-green-700 text-xs font-bold">${item.status || 'CLOSED'}</span>
            </td>
            <td class="p-3">${item.date || "-"} ${item.time || ""}</td> <td class="p-3">${item.closeDate || "-"} ${item.closeTime || ""}</td> <td class="p-3">${item.duration || "-"}</td>
            <td class="p-3">${item.action || "-"}</td>
        </tr>`;
    }).join('');
}

/* =========================================
   ROUTING ENGINE (LOAD PAGE)
========================================= */
function loadPage(page) {
    const contentArea = document.getElementById("contentArea");
    const pageTitle = document.getElementById("pageTitle");

    if (!contentArea || !pageTitle) return;

    contentArea.innerHTML = pages[page] || "<p>Page tidak ditemukan</p>";

    const titles = {
        dashboard: "Dashboard Monitoring ATM",
        ticketproblem: "Ticket Problem",
        ticketreplenish: "Ticket Replenish",
        historyproblem: "History Problem",
        historyreplenish: "History Replenish",
        dataatm: "Data ATM",
        datavendor: "Data Vendor Pengelola",
        datauser: "Data User"
    };
    pageTitle.innerText = titles[page] || "Dashboard Monitoring ATM";

    if (page === "dashboard") {
        updateDashboard();
    } else if (page === "ticketproblem") {
        renderTicketTable(masterTicket);
        updateTicketSummary();
    } else if (page === "ticketreplenish") {
        renderReplenishTable();
    } else if (page === "historyproblem") {
        renderHistoryTable(historyTicket);
        updateHistorySummary(historyTicket);
    } else if (page === "dataatm") {
        renderTable();
    } else if (page === "datavendor") {
        renderVendorTable();
    } else if (page === "datauser") {
        renderUsers();
    }
}

/* =========================================
   DASHBOARD DATA & CHART LOGIC
========================================= */
function updateDashboard(){
  const total = masterDataATM.length;
  const aktif = masterDataATM.filter(atm => atm.status === "Aktif").length;
  const nonaktif = masterDataATM.filter(atm => atm.status === "Nonaktif").length;
  const activeTickets = masterTicket.filter(t => t.status === "OPEN").length;

  if(document.getElementById("dashboardTotalATM")) document.getElementById("dashboardTotalATM").innerText = total;
  if(document.getElementById("dashboardOnlineATM")) document.getElementById("dashboardOnlineATM").innerText = aktif;
  if(document.getElementById("dashboardOfflineATM")) document.getElementById("dashboardOfflineATM").innerText = nonaktif;
  if(document.getElementById("todayProblem")) document.getElementById("todayProblem").innerText = activeTickets;
  
  if(document.getElementById("dashboardPercentATM") && total > 0){
      document.getElementById("dashboardPercentATM").innerText = Math.round((aktif / total) * 100) + "%";
  }

  renderChart(aktif, nonaktif);
}

function renderChart(aktif, nonaktif){
  const ctx = document.getElementById("dailyChart"); 
  if(!ctx) return;

  if(atmChart) atmChart.destroy();

  atmChart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: ["ATM Aktif", "ATM Nonaktif"],
      datasets: [{
        label: "Jumlah ATM",
        data: [aktif, nonaktif],
        backgroundColor: ["#16a34a", "#dc2626"],
        borderRadius: 12
      }]
    },
    options: { responsive: true, plugins: { legend: { display: false } } }
  });
}

/* =========================================
   DATA ATM ACTIONS (MODAL STYLE)
========================================= */
function saveToStorage(){ localStorage.setItem("masterDataATM", JSON.stringify(masterDataATM)); }

// Mengisi pilihan Vendor ke dalam dropdown secara dinamis dari Database Vendor Pengelola
function populateModalVendorDropdown() {
    const selectVendor = document.getElementById("vendor");
    if(!selectVendor) return;
    
    selectVendor.innerHTML = '<option value="">-- Pilih Vendor --</option>';
    
    masterVendor.forEach(v => {
        if(v.namaVendor) {
            const option = document.createElement("option");
            option.value = v.namaVendor;
            option.textContent = v.namaVendor;
            selectVendor.appendChild(option);
        }
    });
}

function openATMModal(){
    const modal = document.getElementById("atmModal");
    if(!modal) return;
    modal.classList.remove("hidden");
    modal.classList.add("flex");
    
    selectedIndex = -1;
    document.getElementById("modalATMTitle").textContent = "Input Data ATM";
    document.getElementById("btnSubmitATM").innerHTML = '<i class="fa-solid fa-floppy-disk mr-2"></i>Simpan Data';
    
    resetForm();
    populateModalVendorDropdown(); // Muat data vendor ke dropdown saat modal dibuka
}

function closeATMModal(){
    const modal = document.getElementById("atmModal");
    if(!modal) return;
    modal.classList.remove("flex");
    modal.classList.add("hidden");
}

function ambilFormData(){
  return {
    idATM: document.getElementById("idATM")?.value.trim() || "",
    lokasi: document.getElementById("lokasi")?.value.trim() || "",
    vendor: document.getElementById("vendor")?.value || "",
    merk: document.getElementById("merk")?.value.trim() || "",
    type: document.getElementById("type")?.value.trim() || "",
    area: document.getElementById("area")?.value.trim() || "",
    status: document.getElementById("status")?.value || ""
  };
}

function validasi(data){
  for(let key in data){ 
    if(data[key] === "") { 
        Swal.fire({ icon: "warning", title: "Data Belum Lengkap", text: "Semua field wajib diisi!", confirmButtonColor: "#2563eb" });
        return false; 
    } 
  }
  return true;
}

async function prosesSimpanATM() {
    // 1. Ambil nilai input
    const start = document.getElementById('startHours').value;
    const end = document.getElementById('endHours').value;
    const idATM = document.getElementById("idATM").value; // Pastikan ambil ID-nya

    // 2. TAMBAHKAN VALIDASI DI SINI
    if (!idATM) {
        Swal.fire("Error", "ID ATM harus diisi!", "error");
        return; // Fungsi berhenti di sini jika ID kosong
    }

    // 3. Jika validasi lolos, buat objek dataBaru
    const dataBaru = {
        idATM: idATM,
        lokasi: document.getElementById("lokasi").value,
        vendor: document.getElementById("vendor").value,
        // ... field lainnya
        serviceHours: (start && end) ? `${start} - ${end}` : '00:00 - 23:59',
        status: document.getElementById("status").value
    };

    // 4. Logika simpan/update ke masterDataATM
    if(selectedIndex === -1) {
        masterDataATM.push(dataBaru);
    } else {
        masterDataATM[selectedIndex] = dataBaru;
    }

    await syncToServer(); 
    closeATMModal();
    renderTableATM();
    selectedIndex = -1;
}

function simpanData(){
  const data = ambilFormData();
  if(!validasi(data)) return;
  if(masterDataATM.some(item => item.idATM === data.idATM)){ 
      Swal.fire({ icon: "error", title: "Gagal", text: "ID ATM sudah terdaftar di database!", confirmButtonColor: "#2563eb" });
      return; 
  }
  masterDataATM.push(data);
  saveToStorage(); 
  renderTable(); 
  closeATMModal();
  Swal.fire({ icon: "success", title: "Berhasil", text: "Data ATM baru berhasil disimpan", confirmButtonColor: "#2563eb" });
}

function renderTable(dataRender = masterDataATM){
  const tableBody = document.getElementById("tableBody");
  if(!tableBody) return;
  tableBody.innerHTML = "";

  if(dataRender.length === 0){
        // Ubah colspan menjadi 10 agar pas dengan jumlah kolom header
        tableBody.innerHTML = `<tr><td colspan="10" class="text-center p-10 text-gray-400">Tidak ada arsip data ATM</td></tr>`;
        return;
  }

  dataRender.forEach((atm, index) => {
    const statusClass = atm.status === "Aktif" ? "bg-emerald-100 text-emerald-700" : "bg-red-100 text-red-700";
    tableBody.innerHTML += `
      <tr class="border-b hover:bg-blue-50/50">
        <td class="p-3 font-semibold text-gray-700">${atm.idATM}</td>
        <td class="p-3">${atm.lokasi}</td>
        <td class="p-3">${atm.vendor}</td>
        <td class="p-3">${atm.merk}</td>
        <td class="p-3">${atm.type}</td>
        <td class="p-3">${atm.denom}</td>                <td class="p-3">${atm.jmlPengisian}</td>        <td class="p-3">${atm.area}</td>
        <td class="p-3 text-center font-mono text-xs">${atm.serviceHours || '-'}</td>
        <td class="p-3"><span class="${statusClass} text-xs px-2.5 py-1 rounded-xl font-bold">${atm.status}</span></td>
        <td class="p-3 text-center">
            <button onclick="editData(${index})" class="bg-amber-500 hover:bg-amber-600 text-white px-3 py-1.5 text-xs rounded-xl font-bold mr-1 shadow-sm transition-all"><i class="fa-solid fa-pen-to-square mr-1"></i>Ubah</button>
            <button onclick="hapusData(${index})" class="bg-red-600 hover:bg-red-700 text-white px-3 py-1.5 text-xs rounded-xl font-bold shadow-sm transition-all"><i class="fa-solid fa-trash mr-1"></i>Hapus</button>
        </td>
      </tr>`;
  });
  if(document.getElementById("totalData")) document.getElementById("totalData").innerText = `Total: ${dataRender.length}`;
}

function editData(index){
  selectedIndex = index;
  const atm = masterDataATM[index];
  if(!atm) return;
  
  const modal = document.getElementById("atmModal");
  if(modal) { modal.classList.remove("hidden"); modal.classList.add("flex"); }
  
  document.getElementById("modalATMTitle").textContent = "Ubah Data ATM: " + atm.idATM;
  document.getElementById("btnSubmitATM").innerHTML = '<i class="fa-solid fa-square-check mr-2"></i>Update Data';

  populateModalVendorDropdown(); 

  // Isi data standar
  document.getElementById("idATM").value = atm.idATM;
  document.getElementById("lokasi").value = atm.lokasi;
  document.getElementById("vendor").value = atm.vendor;
  document.getElementById("merk").value = atm.merk;
  document.getElementById("type").value = atm.type;
  document.getElementById("area").value = atm.area;
  document.getElementById("status").value = atm.status;
  
  // Isi data Denom dan Jml Pengisian yang tadi terlewat
  document.getElementById("inputDenom").value = atm.denom;
  document.getElementById("inputJmlPengisian").value = atm.jmlPengisian;

  // Tangani Service Hours (Pecah string menjadi array)
  if (atm.serviceHours) {
      const hours = atm.serviceHours.split(" - ");
      document.getElementById("startHours").value = hours[0];
      document.getElementById("endHours").value = hours[1];
  } else {
      // Jika data kosong, kosongkan input
      document.getElementById("startHours").value = "";
      document.getElementById("endHours").value = "";
  }
}

function updateData(){
  if(selectedIndex === -1){ return; }
  const data = ambilFormData();
  if(!validasi(data)) return;
  
  masterDataATM[selectedIndex] = data;
  saveToStorage(); 
  renderTable(); 
  closeATMModal();
  Swal.fire({ icon: "success", title: "Berhasil", text: "Arsip Data ATM diperbarui!", confirmButtonColor: "#2563eb" });
}

function hapusData(index){
  Swal.fire({
        title: "Hapus Data ATM?",
        text: "Data terhapus tidak dapat dipulihkan kembali!",
        icon: "warning",
        showCancelButton: true,
        confirmButtonColor: "#dc2626",
        cancelButtonColor: "#3085d6",
        confirmButtonText: "Ya, Hapus!",
        cancelButtonText: "Batal"
  }).then((result) => {
        if (result.isConfirmed) {
            masterDataATM.splice(index,1); 
            saveToStorage(); 
            renderTable();
            Swal.fire({ icon: "success", title: "Terhapus", text: "Unit ATM berhasil dihapus dari sistem.", confirmButtonColor: "#2563eb" });
        }
  });
}

function resetForm(){
  const fields = ["idATM", "lokasi", "vendor", "merk", "type", "area", "status"];
  fields.forEach(f => { if(document.getElementById(f)) document.getElementById(f).value = ""; });
}

function searchData(){
  const keyword = document.getElementById("searchInput").value.toLowerCase();
  const hasil = masterDataATM.filter(atm => atm.idATM.toLowerCase().includes(keyword) || atm.lokasi.toLowerCase().includes(keyword));
  renderTable(hasil);
}

function uploadExcel(){
  const inputFile = document.getElementById("uploadExcel");
  if(!inputFile || !inputFile.files[0]) { alert("Silakan pilih file Excel"); return; }
  const reader = new FileReader();
  reader.onload = function(e){
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, {type:"array"});
    const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
    jsonData.forEach(item => {
      masterDataATM.push({
        idATM: String(item["ID ATM"] || "").trim(), lokasi: String(item["Lokasi"] || "").trim(),
        vendor: String(item["Vendor"] || "").trim(), merk: String(item["Merk"] || "").trim(),
        type: String(item["Type"] || "").trim(), area: String(item["Area"] || "").trim(), status: String(item["Status"] || "Aktif").trim()
      });
    });
    saveToStorage(); renderTable(); alert("Excel Uploaded!");
  };
  reader.readAsArrayBuffer(inputFile.files[0]);
}

function downloadTemplate() {
  // Tambahkan kolom Denom dan Jumlah Pengisian di sini
  const templateData = [{
      "ID ATM": "", 
      "Lokasi": "", 
      "Vendor": "", 
      "Merk": "", 
      "Type": "", 
      "Denom": "", 
      "Jumlah Pengisian": "", 
      "Area": "", 
      "Status": ""
  }];
  
  const worksheet = XLSX.utils.json_to_sheet(templateData);
  const workbook = XLSX.utils.book_new();
  
  XLSX.utils.book_append_sheet(workbook, worksheet, "Master ATM");
  XLSX.writeFile(workbook, "Format_Master_Data_ATM.xlsx");
}

function exportDataExcel(){
  const worksheet = XLSX.utils.json_to_sheet(masterDataATM);
  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, "Database ATM");
  XLSX.writeFile(workbook, "Database_ATM.xlsx");

function filterHistory() {
    const start = document.getElementById("startDate").value;
    const end = document.getElementById("endDate").value;
    
    // Hapus baris yang mengambil value filterStatus jika ada
    // const status = document.getElementById("filterStatus").value; 

    // Filter data hanya berdasarkan tanggal
    historyDataFiltered = historyTicket.filter(item => {
        const itemDate = item.date;
        let match = true;
        if (start && itemDate < start) match = false;
        if (end && itemDate > end) match = false;
        return match;
    });

    renderHistoryTable(historyDataFiltered);
    updateHistorySummary(historyDataFiltered);
}

function searchHistoryData(){
    const atmKeyword = document.getElementById("searchATM").value.toLowerCase();
    const ticketKeyword = document.getElementById("searchTicket").value.toLowerCase();
    const result = historyTicket.filter(item => item.atmId.toLowerCase().includes(atmKeyword) && item.ticketId.toLowerCase().includes(ticketKeyword));
    renderHistoryTable(result);
    updateHistorySummary(result);

    if(document.getElementById("historyOpen")) document.getElementById("historyOpen").textContent = data.filter(item => item.status === "OPEN").length;
    if(document.getElementById("historyClosed")) document.getElementById("historyClosed").textContent = data.filter(item => item.status === "CLOSED").length;

function renderReplenishTable() {
    // 1. HAPUS localStorage, gunakan variabel global 'masterReplenish' 
    // yang sudah diisi oleh fungsi loadDataFromServer()
    const tbody = document.getElementById("replenishTableBody");
    
    if (!tbody) return;
    tbody.innerHTML = ""; // Bersihkan tabel

    // 2. Filter data dari variabel global
    // Pastikan masterReplenish adalah array
    const dataReplenish = Array.isArray(masterReplenish) ? masterReplenish : [];
    const activeTickets = dataReplenish.filter(t => (t.status || 'OPEN').toUpperCase() !== 'CLOSED');

    activeTickets.forEach((t) => {
        // --- LOGIKA PENGAMBILAN DATA MASTER ATM ---
        const atmData = (typeof masterDataATM !== 'undefined') 
                        ? masterDataATM.find(atm => atm.idATM === (t.idATM || t.atmId)) 
                        : null;

        // Mendapatkan index asli dari array global masterReplenish
        const realIndex = dataReplenish.findIndex(item => item.ticketId === t.ticketId);

        // Mapping variabel
        const atmId = t.atmId || '-';
        const lokasi = atmData ? atmData.lokasi : '-';
        const vendor = atmData ? atmData.vendor : (t.vendor || '-');
        const denom = t.denom || '-';
        const nominal = t.nominal || '-';
        const tanggal = t.date || t.tanggal || '-';
        const jam = t.time || t.jam || '-';
        const keterangan = t.keterangan || '-';
        const status = (t.status || 'OPEN').toUpperCase();

        // 3. Render Baris Tabel
        const row = document.createElement("tr");
        row.className = "border-b border-gray-100 hover:bg-blue-50/30 transition-colors";
        
        row.innerHTML = `
            <td class="p-3 text-center">${t.ticketId || '-'}</td>
            <td class="p-3 text-center">${atmId}</td>
            <td class="p-3">${lokasi}</td>
            <td class="p-3 text-center">${vendor}</td>
            <td class="p-3 text-center">
                <span class="px-2 py-1 rounded text-xs font-semibold ${getStatusClass(status)}">
                    ${status}
                </span>
            </td>
            <td class="p-3 text-center">${denom}</td>
            <td class="p-3 text-center">${nominal}</td>
            <td class="p-3 text-center">${tanggal}</td>
            <td class="p-3 text-center">${jam}</td>
            <td class="p-3 text-center">
                <button onclick="confirmReplenish(${realIndex})" class="text-blue-600"><i class="fa-solid fa-check-to-slot"></i></button>
            </td>
            <td class="p-3 text-center">
                <button onclick="validateReplenishProcess(${realIndex})" class="text-green-600"><i class="fa-solid fa-user-check"></i></button>
            </td>
            <td class="p-3 text-center">
                <button onclick="editReplenish(${realIndex})" class="text-orange-500 hover:text-orange-700">
                    <i class="fa-solid fa-edit"></i>
                </button>
            </td>
            <td class="p-3 text-xs text-red-600 italic">
                ${keterangan}
            </td>
        `;
        tbody.appendChild(row);
    });
}

    Swal.fire({
        title: 'Yakin hapus?',

        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'Ya, Hapus!'
    }).then((result) => {

        }

function validateReplenishProcess(index) {
    let masterReplenish = JSON.parse(localStorage.getItem("masterReplenish")) || [];
    const ticket = masterReplenish[index];

    // --- LOGIKA MENGAMBIL DATA LOKASI ---
    const atmData = (typeof masterDataATM !== 'undefined') 
                    ? masterDataATM.find(atm => atm.idATM === (ticket.idATM || ticket.atmId)) 
                    : null;
    const lokasi = atmData ? atmData.lokasi : '-';

    Swal.fire({
        title: `Validasi Tiket: ${ticket.ticketId}`,
        html: `
            <div class="text-center mb-4">
                <p class="font-bold text-lg text-blue-600">Sudah selesai replenish</p>
                <hr class="my-2">
            </div>
            <div class="text-left text-sm">
                <p><strong>ATM ID:</strong> ${ticket.atmId}</p>
                <p><strong>Lokasi:</strong> ${lokasi}</p>
                <p><strong>Vendor:</strong> ${ticket.vendor}</p>
                <p><strong>Denom:</strong> ${ticket.denom || '-'}</p>
                <p><strong>Nominal:</strong> ${ticket.nominal || '-'}</p>
            </div>
        `,
        showDenyButton: true,
        showCancelButton: true,
        confirmButtonText: 'Approve',
        denyButtonText: 'Reject',
        cancelButtonText: 'Batal',
        confirmButtonColor: '#16a34a',
        denyButtonColor: '#dc2626'
    }).then((result) => {
        if (result.isConfirmed) {
            // APPROVE: Update status ke COMPLETED (atau CLOSED sesuai kebutuhan)
            ticket.status = "COMPLETED";
            localStorage.setItem("masterReplenish", JSON.stringify(masterReplenish));
            
            // Refresh tabel
            renderReplenishTable();
            if (typeof renderHistoryReplenishTable === 'function') renderHistoryReplenishTable();
            
            Swal.fire("Disetujui!", "Tiket Replenish telah selesai.", "success");

        } else if (result.isDenied) {
            // REJECT: Input alasan
            Swal.fire({
                title: "Alasan Reject",
                input: "text",
                inputPlaceholder: "Masukkan alasan reject...",
                confirmButtonText: "Simpan",
                inputValidator: (val) => { if(!val) return "Alasan wajib diisi"; }
            }).then((rej) => {
                if(rej.isConfirmed) {
                    ticket.status = "REJECTED";
                    ticket.keterangan = rej.value;
                    localStorage.setItem("masterReplenish", JSON.stringify(masterReplenish));
                    
                    renderReplenishTable();
                    if (typeof renderHistoryReplenishTable === 'function') renderHistoryReplenishTable();
                    
                    Swal.fire("Ditolak", "Tiket Replenish telah direject.", "error");
                }
            });
        }
    });
}

function setInitialTime(dateId, timeId) {

    if (dateEl) dateEl.value = now.toISOString().split("T")[0];
    if (timeEl) {
        const jam = now.getHours().toString().padStart(2, '0');
        const menit = now.getMinutes().toString().padStart(2, '0');
        timeEl.value = `${jam}:${menit}`;

function renderUserTable() {

                </td>
                <td class="p-3 text-center">

                    <button onclick="deleteUser(${index})" class="text-red-600 hover:text-red-800"><i class="fa-solid fa-trash"></i></button>
                </td>
            </tr>
        `;
        tbody.innerHTML += row;
    });
    
    // Update counter total user
    document.getElementById('totalUser').innerText = `Total: ${userListData.length}`;
}

function searchUser() {
    const input = document.getElementById('searchUser').value.toUpperCase();
    const rows = document.getElementById('userTableBody').getElementsByTagName('tr');

    for (let i = 0; i < rows.length; i++) {
        let text = rows[i].textContent || rows[i].innerText;
        rows[i].style.display = text.toUpperCase().indexOf(input) > -1 ? "" : "none";
    }
}

// Fungsi untuk mengambil data dari Firestore secara Real-time
function initDataFromFirestore() {
    db.collection("tickets").onSnapshot((snapshot) => {
        masterTicket = []; // Reset array lokal
        snapshot.forEach((doc) => {
            // Menyimpan doc.id agar kita bisa melakukan update nanti
            masterTicket.push({ docId: doc.id, ...doc.data() });
        });
        
        // Panggil fungsi render yang sudah Anda punya
        renderTicketTable(); 
        console.log("Data berhasil dimuat dari Firestore:", masterTicket);
    }, (error) => {
        console.error("Gagal mengambil data:", error);
    });
}
